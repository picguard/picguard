name: Test Windows store (free arm64)

on:
  workflow_dispatch:

# Declare default permissions as readonly.
permissions: read-all

jobs:
  store-free:
    name: Create store
    runs-on: windows-11-arm
    env:
      Platform: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        shell: pwsh
        run: .\scripts\install-flutter-github-actions.ps1

      - name: Download a fresh binary instead of using the stamped x64 version
        shell: pwsh
        run: |
          Remove-Item -Path "$env:FLUTTER_ROOT\flutter\bin\cache\engine-dart-sdk.stamp" -Force -ErrorAction SilentlyContinue
          dart --version
          flutter precache --windows

      - name: Flutter doctor -v
        run: flutter doctor -v

      - name: Configure .env
        run: |
          $bytes = echo $env:ENV_KEY | %{[Convert]::FromBase64String($_)}
          [IO.File]::WriteAllBytes("$pwd\.env", $bytes)
        env:
          ENV_KEY: ${{ secrets.ENV_STG_BASE64_WINDOWS }}

      - name: copy eula.rtf to the windows folder
        run: Copy-Item -Path "$pwd\macos\packaging\base\eula.rtf" -Destination "$pwd\windows\LICENSE.rtf" -Force

      - name: Install yq
        shell: pwsh
        run: choco install yq --no-progress

      - name: Update config
        shell: pwsh
        run: |
          # https://stackoverflow.com/questions/15414678/how-to-decode-a-base64-string
          # https://stackoverflow.com/questions/66239147/pfx-encoded-and-back-to-pfx-in-powershell
          $env:certificatePath = "$env:RUNNER_TEMP\picguard.pfx"
          $bytes = echo $env:WINDOWS_CERTIFICATE | %{[Convert]::FromBase64String($_)}
          [IO.File]::WriteAllBytes("$env:certificatePath", $bytes)
          
          $certificatePassword = (Get-Item -Path Env:WINDOWS_CERTIFICATE_PASSWORD).Value

          $yamlFile = ".\windows\packaging\msix\make_config.yaml"
          $yamlContent = Get-Content -Raw -Path $yamlFile

          # 获取环境变量的值
          $identityName = (Get-Item -Path Env:WINDOWS_IDENTITY_NAME).Value
          $publisher = (Get-Item -Path Env:WINDOWS_PUBLISHER).Value
          $publisherName = (Get-Item -Path Env:WINDOWS_PUBLISHER_NAME).Value

          # 使用 yq 更新多个字段
          $updatedYamlContent = echo $yamlContent | yq e ".architecture = `"$env:Platform`" | .certificate_path = env(certificatePath) | .certificate_password = `"$certificatePassword`" | .architecture = `"$env:Platform`" | .identity_name = `"$identityName`" | .publisher = `"$publisher`" | .publisher_display_name = `"$publisherName`"" -

          # 将更新后的内容写回文件
          Set-Content -Path $yamlFile -Value $updatedYamlContent
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_IDENTITY_NAME: ${{ secrets.WINDOWS_IDENTITY_NAME }}
          WINDOWS_PUBLISHER: ${{ secrets.WINDOWS_PUBLISHER }}
          WINDOWS_PUBLISHER_NAME: ${{ secrets.WINDOWS_PUBLISHER_NAME }}

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Remove compiler options deprecated in VS 2026.
        run: |
          $file = "$pwd\windows\flutter\ephemeral\.plugin_symlinks\permission_handler_windows\windows\CMakeLists.txt"
          (Get-Content $file) | Where-Object { $_ -notmatch 'target_compile_options\(\$\{PLUGIN_NAME\} PRIVATE /await\)' } | Set-Content $file

      - name: Build msix
        run: |
          $env:SENTRY_NATIVE_BACKEND = "breakpad"
          $env:FLUTTER_WINDOWS_PLATFORM = "$env:Platform"
          fastforge package `
            --skip-clean `
            --flutter-build-args "dart-define-from-file=.env,target=lib/main_free.dart" `
            --platform windows `
            --targets msix `
            --artifact-name "{{name}}-{{build_name}}.{{build_number}}-{{platform}}-$env:Platform.{{ext}}"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-msix-artifact
          path: .\dist\**\*.msix

      - name: Clean up
        if: ${{ always() }}
        run: |
          if (test-path -Path "$env:RUNNER_TEMP\picguard.pfx") {
            echo "$env:RUNNER_TEMP\picguard.pfx"
            remove-item -Path "$env:RUNNER_TEMP\picguard.pfx" -Force -ErrorAction SilentlyContinue
          } else {
            echo "File($env:RUNNER_TEMP\picguard.pfx) doesn't exist."
          }
          if (test-path -Path "$pwd\.env") {
            echo "Remove file($pwd\.env)"
            remove-item -Path "$pwd\.env" -Force -ErrorAction SilentlyContinue
          } else {
            echo "File($pwd\.env) doesn't exist."
          }
